services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: rag-web-ui/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ../scripts/rag:/app/scripts/rag:ro
      - ../schemas:/app/schemas:ro
      - ../.chroma:/app/.chroma
    depends_on:
      - chromadb

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8100:8000"
    volumes:
      - chroma-data:/chroma/chroma

volumes:
  chroma-data:
